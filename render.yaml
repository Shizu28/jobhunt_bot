services:
  - type: web
    name: jobhunter-ai
    runtime: node
    plan: starter          # "free" hat keinen Persistent Disk – starter = ~$7/Monat
    buildCommand: PUPPETEER_SKIP_DOWNLOAD=true npm install
    startCommand: node server.js
    healthCheckPath: /api/status

    envVars:
      # -- Node-Version (node:sqlite braucht >= 22.5) --
      - key: NODE_VERSION
        value: 22.11.0

      # -- Puppeteer: Browser-Binary auf Render nicht herunterladen (spart Fehler/Zeit) --
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"

      # -- Datenpfad (Persistent Disk Mount) --
      - key: DATA_DIR
        value: /var/data

      # -- KI-Modus: "ollama" oder "anthropic" --
      - key: AI_MODE
        value: ollama

      # -- Cloudflare-Tunnel-URL zu deinem lokalen Ollama (localhost:11434)
      #    Format: https://xxxxx.trycloudflare.com
      #    Muss nach jedem Neustart des Tunnels aktualisiert werden (Quick Tunnel)
      #    → Dauerhaft: Named Tunnel mit fester Domain (siehe cloudflare-tunnel.bat)
      - key: OLLAMA_URL
        value: https://spread-raid-showers-beverly.trycloudflare.com/

      # -- Ollama-Modelle --
      - key: OLLAMA_MODEL
        value: qwen3.5:4b
      - key: OLLAMA_VISION_MODEL
        value: llava:latest
      - key: OLLAMA_LETTER_MODEL
        value: qwen3.5:4b

      # -- Zugangs-PIN (schützt die App im Internet!) --
      - key: ACCESS_PIN
        sync: false        # <-- im Render-Dashboard manuell eintragen

      # -- Anthropic (optional, nur wenn AI_MODE=anthropic) --
      - key: ANTHROPIC_API_KEY
        sync: false

      # -- E-Mail / SMTP (optional) --
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: USER_EMAIL
        sync: false

      # -- Scan-Intervall in Minuten --
      - key: SCAN_INTERVAL_MINUTES
        value: "60"

    disk:
      name: jobhunter-data
      mountPath: /var/data
      sizeGB: 1            # ~$0.25/Monat – speichert DB, Uploads, Sessions
